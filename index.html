<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        var el = document.createElement('div');
        el.style.cssText = 'color:red; z-index:99999; position:fixed; top:0; left:0; right:0; background:white; padding:20px; font-size:16px; border-bottom: 2px solid red; max-height: 50vh; overflow: auto;';
        el.innerHTML = '<strong>' + message + '</strong><br>' + (error ? error.stack : '');
        document.body.appendChild(el);
      };
      window.addEventListener('unhandledrejection', function(event) {
        var el = document.createElement('div');
        el.style.cssText = 'color:red; z-index:99999; position:fixed; top:50vh; left:0; right:0; background:white; padding:20px; font-size:16px; border-bottom: 2px solid red; max-height: 50vh; overflow: auto;';
        el.innerHTML = '<strong>Unhandled Promise: ' + event.reason + '</strong><br>' + (event.reason && event.reason.stack ? event.reason.stack : '');
        document.body.appendChild(el);
      });
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com">

    <meta name="keywords" content="e-commerce haiti, marketplace haiti, moncash, natcash, achats en ligne haiti, zabely" />

    <!-- Critical CSS inline (first paint optimization) -->
    <style>
      /* Critical above-the-fold styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      #root {
        min-height: 100vh;
      }
      
      /* Loading spinner */
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8fafc;
        z-index: 9999;
      }
      
      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #f97316;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
    
    <title>Zabely - E-commerce en Haïti</title>
  </head>
  <body>
    <div id="root">
      <div style="height: 100vh; display: flex; align-items: center; justify-content: center; background: #f8fafc; font-family: sans-serif; color: #64748b;">
        <div style="text-align: center;">
          <div style="width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top-color: #f97316; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px;"></div>

        </div>

    </div>
